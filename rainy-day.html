<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下雨天</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', 'Noto Serif SC', 'KaiTi', serif;
    cursor: default;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
  }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.15) 0%, transparent 55%),
      linear-gradient(to bottom, rgba(255,255,255,0.05) 0%, rgba(200,210,220,0.15) 100%);
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    padding: 2rem;
  }

  .title {
    font-size: clamp(2rem, 5vw, 4rem);
    color: #3a4a5a;
    letter-spacing: 0.15em;
    text-shadow: 0 0 40px rgba(255,255,255,0.6), 0 2px 4px rgba(0,0,0,0.08);
    animation: float 6s ease-in-out infinite;
    margin-bottom: 0.5rem;
  }

  .subtitle {
    font-size: clamp(0.9rem, 1.5vw, 1.3rem);
    color: rgba(80,95,110,0.7);
    letter-spacing: 0.3em;
    animation: float 6s ease-in-out infinite 0.5s;
  }

  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(100,120,140,0.5), transparent);
    margin: 2rem 0;
    animation: pulse 3s ease-in-out infinite;
  }

  .quote {
    color: rgba(80,95,110,0.55);
    font-size: clamp(0.75rem, 1.2vw, 1rem);
    letter-spacing: 0.15em;
    max-width: 480px;
    line-height: 2;
    animation: fadeInOut 8s ease-in-out infinite;
    text-shadow: 0 0 10px rgba(255,255,255,0.4);
  }

  .droplets {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }

  .droplet {
    position: absolute;
    width: 3px;
    height: 12px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.45));
    border-radius: 50%;
    animation: dropletFall linear infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; width: 80px; }
    50% { opacity: 1; width: 120px; }
  }

  @keyframes fadeInOut {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.75; }
  }

  @keyframes dropletFall {
    0% { transform: translateY(-100px) translateX(0); opacity: 0; }
    5% { opacity: 1; }
    90% { opacity: 0.5; }
    100% { transform: translateY(105vh) translateX(-30px); opacity: 0; }
  }
</style>
</head>
<body>

<div class="overlay"></div>
<canvas id="rain"></canvas>
<div class="droplets" id="droplets"></div>

<div class="content">
  <h1 class="title">听 雨</h1>
  <div class="divider"></div>
  <p class="subtitle">雨落无声 · 心自有音</p>
  <br>
  <p class="quote">
    一任阶前、点滴到天明。<br>
    少年听雨歌楼上，红烛昏罗帐。<br>
    壮年听雨客舟中，江阔云低、断雁叫西风。
  </p>
</div>

<script>
const canvas = document.getElementById('rain');
const ctx = canvas.getContext('2d');

let w, h;

// ---- Pre-generated tree positions (stable, not regenerated each frame) ----
let nearTrees = [];
let farTrees = [];

function pseudoRandom(seed) {
  const x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}

function generateTrees() {
  nearTrees = [];
  const shoreY = h * 0.65;
  for (let i = 0; i < 16; i++) {
    const tx = w * 0.04 + i * w * 0.062 + Math.sin(i * 2.7) * 25;
    const s = 0.5 + pseudoRandom(i * 0.37) * 0.9;
    nearTrees.push({ x: tx, y: shoreY - 6 * s, s });
  }

  farTrees = [];
  for (let i = 0; i < 22; i++) {
    const tx = w * 0.01 + i * w * 0.048;
    const s = 0.3 + pseudoRandom(i * 0.73) * 0.5;
    farTrees.push({ x: tx, y: h * 0.88 + Math.sin(tx * 0.006 + 0.5) * h * 0.03, s });
  }
}

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
  generateTrees();
}
resize();
window.addEventListener('resize', resize);

// ---- Landscape drawing ----
function drawLandscape() {
  // Sky gradient - soft overcast sky
  const sky = ctx.createLinearGradient(0, 0, 0, h * 0.65);
  sky.addColorStop(0, '#c8d8e8');
  sky.addColorStop(0.3, '#d5e0ec');
  sky.addColorStop(0.6, '#e2e8f0');
  sky.addColorStop(1, '#ecf0f3');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, w, h * 0.65);

  // Distant mountains - layer 1
  ctx.fillStyle = '#bcc8d6';
  ctx.beginPath();
  ctx.moveTo(0, h * 0.65);
  for (let x = 0; x <= w; x += 2) {
    ctx.lineTo(x, h * 0.48 + Math.sin(x * 0.002) * h * 0.08 + Math.sin(x * 0.005 + 1) * h * 0.06 + Math.sin(x * 0.012) * h * 0.03);
  }
  ctx.lineTo(w, h * 0.65);
  ctx.closePath();
  ctx.fill();

  // Distant mountains - layer 2
  ctx.fillStyle = '#a8b8c8';
  ctx.beginPath();
  ctx.moveTo(0, h * 0.65);
  for (let x = 0; x <= w; x += 2) {
    ctx.lineTo(x, h * 0.52 + Math.sin(x * 0.003 + 2) * h * 0.07 + Math.sin(x * 0.006) * h * 0.05 + Math.sin(x * 0.01 + 0.5) * h * 0.03);
  }
  ctx.lineTo(w, h * 0.65);
  ctx.closePath();
  ctx.fill();

  // Closer hills - layer 3
  ctx.fillStyle = '#8daa8d';
  ctx.beginPath();
  ctx.moveTo(0, h * 0.65);
  for (let x = 0; x <= w; x += 2) {
    ctx.lineTo(x, h * 0.56 + Math.sin(x * 0.004 + 1.5) * h * 0.05 + Math.sin(x * 0.008) * h * 0.03 + Math.sin(x * 0.015 + 2) * h * 0.02);
  }
  ctx.lineTo(w, h * 0.65);
  ctx.closePath();
  ctx.fill();

  // Closest hills - layer 4
  ctx.fillStyle = '#7a9a7a';
  ctx.beginPath();
  ctx.moveTo(0, h * 0.65);
  for (let x = 0; x <= w; x += 2) {
    ctx.lineTo(x, h * 0.58 + Math.sin(x * 0.005 + 3) * h * 0.04 + Math.sin(x * 0.009 + 1) * h * 0.025 + Math.sin(x * 0.018) * h * 0.015);
  }
  ctx.lineTo(w, h * 0.65);
  ctx.closePath();
  ctx.fill();

  // Lake
  const lake = ctx.createLinearGradient(0, h * 0.65, 0, h);
  lake.addColorStop(0, '#8aaccc');
  lake.addColorStop(0.15, '#95b5d5');
  lake.addColorStop(0.5, '#a0c0dd');
  lake.addColorStop(1, '#b0c8e0');
  ctx.fillStyle = lake;
  ctx.fillRect(0, h * 0.65, w, h * 0.35);

  // Shore line
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h * 0.65);
  for (let x = 0; x <= w; x += 3) {
    ctx.lineTo(x, h * 0.65 + Math.sin(x * 0.01) * 2 + Math.sin(x * 0.04) * 1);
  }
  ctx.stroke();

  // Far shore
  ctx.fillStyle = '#6a8a6a';
  ctx.beginPath();
  ctx.moveTo(0, h);
  for (let x = 0; x <= w; x += 2) {
    ctx.lineTo(x, h * 0.88 + Math.sin(x * 0.006 + 0.5) * h * 0.03 + Math.sin(x * 0.014 + 1.2) * h * 0.015);
  }
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fill();

  // Near-shore trees
  function drawTree(tx, ty, scale) {
    ctx.fillStyle = '#6a8a6a';
    ctx.fillRect(tx - 2 * scale, ty, 4 * scale, 15 * scale);
    ctx.beginPath();
    ctx.moveTo(tx, ty - 22 * scale);
    ctx.lineTo(tx - 10 * scale, ty + 2 * scale);
    ctx.lineTo(tx + 10 * scale, ty + 2 * scale);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(tx, ty - 14 * scale);
    ctx.lineTo(tx - 8 * scale, ty + 4 * scale);
    ctx.lineTo(tx + 8 * scale, ty + 4 * scale);
    ctx.closePath();
    ctx.fill();
  }

  for (const t of nearTrees) { drawTree(t.x, t.y, t.s); }

  // Far-shore trees
  function drawFarTree(tx, ty, scale) {
    ctx.fillStyle = '#5a7a5a';
    ctx.fillRect(tx - 1 * scale, ty - 8 * scale, 2 * scale, 8 * scale);
    ctx.beginPath();
    ctx.moveTo(tx, ty - 18 * scale);
    ctx.lineTo(tx - 7 * scale, ty - 2 * scale);
    ctx.lineTo(tx + 7 * scale, ty - 2 * scale);
    ctx.closePath();
    ctx.fill();
  }

  for (const t of farTrees) { drawFarTree(t.x, t.y, t.s); }
}

// ---- Rain system ----
const drops = [];
const DROP_COUNT = 300;
const splashes = [];

class Drop {
  constructor() {
    this.reset();
    this.y = Math.random() * h;
  }

  reset() {
    this.x = Math.random() * (w + 200) - 100;
    this.y = Math.random() * -h * 0.5;
    this.len = 12 + Math.random() * 22;
    this.speed = 7 + Math.random() * 14;
    this.weight = 0.6 + Math.random() * 1.8;
    this.opacity = 0.15 + Math.random() * 0.35;
    this.wind = -0.5 - Math.random() * 1.5;
  }

  update() {
    this.y += this.speed;
    this.x += this.wind;
    if (this.y > h + 20) { this.reset(); }
    if (this.x < -100 || this.x > w + 100) { this.reset(); }
  }

  draw(ctx) {
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x + this.wind * 1.5, this.y + this.len);
    ctx.strokeStyle = `rgba(140,175,215,${this.opacity})`;
    ctx.lineWidth = this.weight;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
}

class Splash {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.age = 0;
    this.maxAge = 12 + Math.random() * 18;
    this.particles = [];
    const count = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x: 0, y: 0,
        vx: (Math.random() - 0.5) * 2.5,
        vy: -(1 + Math.random() * 2.5),
        size: 0.5 + Math.random() * 1.2
      });
    }
  }

  update() {
    this.age++;
    for (const p of this.particles) { p.x += p.vx; p.y += p.vy; p.vy += 0.06; }
    return this.age < this.maxAge;
  }

  draw(ctx) {
    const life = 1 - this.age / this.maxAge;
    for (const p of this.particles) {
      ctx.beginPath();
      ctx.arc(this.x + p.x, this.y + p.y, p.size * life, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(160,200,230,${0.3 * life})`;
      ctx.fill();
    }
  }
}

for (let i = 0; i < DROP_COUNT; i++) {
  drops.push(new Drop());
  drops[i].y = Math.random() * h * 1.3 - h * 0.3;
}

// ---- Mist ----
class MistParticle {
  constructor() {
    this.reset(true);
  }

  reset(initial) {
    this.x = Math.random() * w;
    this.y = Math.random() * h * 0.5 + h * 0.2;
    this.radius = 60 + Math.random() * 180;
    this.opacity = 0.004 + Math.random() * 0.02;
    this.vx = (Math.random() - 0.5) * 0.12;
  }

  update() {
    this.x += this.vx;
    if (this.x > w + this.radius) this.x = -this.radius;
    if (this.x < -this.radius) this.x = w + this.radius;
  }

  draw(ctx) {
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
    g.addColorStop(0, `rgba(220,230,240,${this.opacity})`);
    g.addColorStop(0.5, `rgba(200,215,230,${this.opacity * 0.5})`);
    g.addColorStop(1, 'rgba(180,200,220,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

const mistParticles = [];
for (let i = 0; i < 10; i++) mistParticles.push(new MistParticle());

// ---- Lake ripples ----
const ripples = [];
class Ripple {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.radius = 0;
    this.maxRadius = 8 + Math.random() * 20;
    this.opacity = 0.15 + Math.random() * 0.2;
    this.speed = 0.3 + Math.random() * 0.5;
  }
  update() { this.radius += this.speed; return this.radius < this.maxRadius; }
  draw(ctx) {
    const life = 1 - this.radius / this.maxRadius;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${this.opacity * life})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
}

let rippleTimer = 0;

// ---- Lightning ----
let lightningAlpha = 0;
let lightningTimer = 0;
let nextLightning = 300 + Math.random() * 600;

// ---- Animation loop ----
function draw() {
  ctx.clearRect(0, 0, w, h);

  drawLandscape();

  for (const m of mistParticles) { m.update(); m.draw(ctx); }

  for (const d of drops) {
    d.update(); d.draw(ctx);
    if (d.y > h * 0.65 && d.y < h && d.x > 0 && d.x < w && Math.random() < 0.04) {
      splashes.push(new Splash(d.x, d.y));
    }
  }

  for (let i = splashes.length - 1; i >= 0; i--) {
    if (!splashes[i].update()) splashes.splice(i, 1);
    else splashes[i].draw(ctx);
  }

  rippleTimer++;
  if (rippleTimer > 4 && Math.random() < 0.25) {
    rippleTimer = 0;
    ripples.push(new Ripple(Math.random() * w, h * 0.67 + Math.random() * h * 0.3));
  }
  for (let i = ripples.length - 1; i >= 0; i--) {
    if (!ripples[i].update()) ripples.splice(i, 1);
    else ripples[i].draw(ctx);
  }

  lightningTimer--;
  if (lightningTimer <= 0 && Math.random() < 0.002) {
    lightningAlpha = 0.03 + Math.random() * 0.06;
    lightningTimer = 3 + Math.floor(Math.random() * 10);
    nextLightning = 200 + Math.random() * 800;
  }
  if (lightningAlpha > 0) {
    ctx.fillStyle = `rgba(240,245,255,${lightningAlpha})`;
    ctx.fillRect(0, 0, w, h);
    lightningAlpha *= 0.7;
    if (lightningAlpha < 0.001) lightningAlpha = 0;
  }

  const vignette = ctx.createRadialGradient(w / 2, h / 2, w * 0.35, w / 2, h / 2, w * 0.8);
  vignette.addColorStop(0, 'rgba(255,255,255,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.12)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, w, h);

  requestAnimationFrame(draw);
}

// ---- CSS droplets ----
(function() {
  const container = document.getElementById('droplets');
  for (let i = 0; i < 50; i++) {
    const d = document.createElement('div');
    d.className = 'droplet';
    d.style.left = Math.random() * 98 + '%';
    d.style.animationDuration = 0.6 + Math.random() * 1.8 + 's';
    d.style.animationDelay = Math.random() * 3 + 's';
    d.style.width = 2 + Math.random() * 3 + 'px';
    d.style.height = 8 + Math.random() * 18 + 'px';
    container.appendChild(d);
  }
})();

draw();
</script>
</body>
</html>
